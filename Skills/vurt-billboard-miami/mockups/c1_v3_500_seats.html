<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1680px; height: 800px; overflow: hidden; background: #222; }

  .board {
    width: 1680px; height: 800px;
    background: #0B0B0B; color: #EBEBEB;
    font-family: 'Inter', sans-serif;
    padding: 80px 100px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .number {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 320px;
    line-height: 0.85;
    letter-spacing: -0.06em;
    color: #E63946;
  }

  .number-label {
    font-weight: 600;
    font-size: 36px;
    color: #EBEBEB;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 12px;
  }

  .vurt-logo {
    font-weight: 900;
    font-size: 64px;
    letter-spacing: 0.02em;
    color: #EBEBEB;
  }

  .right-side {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 24px;
    margin-top: 24px;
  }

  .when {
    font-weight: 700;
    font-size: 80px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: #EBEBEB;
  }

  .where {
    font-weight: 500;
    font-size: 26px;
    color: #888;
    letter-spacing: 0.02em;
    max-width: 600px;
    text-align: right;
    line-height: 1.4;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .cta {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 40px;
    color: #E63946;
  }
</style>
</head>
<body>
<div class="board">
  <div class="top">
    <div>
      <div class="number">500</div>
      <div class="number-label">on the rooftop</div>
    </div>
    <div class="right-side">
      <div class="vurt-logo">VURT</div>
      <div class="when">Friday<br>5.29</div>
      <div class="where">Opening Night · Gates Hotel South Beach<br>Hosted by Brooks · Lucas · Sorey · Tomosunas</div>
    </div>
  </div>
  <div class="bottom">
    <div></div>
    <div class="cta">myvurt.com/abff →</div>
  </div>
</div>
</body>
</html>
