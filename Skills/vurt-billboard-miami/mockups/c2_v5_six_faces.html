<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1680px; height: 800px; overflow: hidden; background: #000; }

  .board {
    position: relative;
    width: 1680px; height: 800px;
    background: #0B0B0B;
    color: #EBEBEB;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    padding: 50px 80px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .vurt-logo {
    font-weight: 900;
    font-size: 64px;
    letter-spacing: 0.01em;
    color: #EBEBEB;
  }

  .free-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 20px;
    color: #E63946;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 36px;
    height: 540px;
    margin-bottom: 14px;
  }

  .tile {
    position: relative;
    border-radius: 32px;
    overflow: hidden;
    background: #181818;
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  }

  .tile-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Each tile gets a different cinematic grade so they read as different shows.
     PRODUCTION REPLACES with real Frame.io stills. */
  .tile-1 .tile-img { filter: saturate(1.1) contrast(1.05) brightness(0.95) hue-rotate(-8deg); }
  .tile-2 .tile-img { filter: saturate(0.55) contrast(1.25) brightness(0.55) hue-rotate(190deg); }
  .tile-3 .tile-img { filter: saturate(1.15) contrast(1.1) brightness(0.85) hue-rotate(20deg) sepia(0.25); }

  .tile-shade {
    position: absolute;
    inset: auto 0 0 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.0) 100%);
  }

  .tile-meta {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 24px;
    z-index: 2;
  }

  .tile-genre {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #E63946;
    margin-bottom: 6px;
  }

  .tile-title {
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #EBEBEB;
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 14px;
  }

  .tag-line {
    font-weight: 700;
    font-size: 38px;
    letter-spacing: -0.02em;
    color: #EBEBEB;
  }

  .url {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 38px;
    color: #EBEBEB;
  }
</style>
</head>
<body>
<div class="board">
  <div class="top-bar">
    <div class="vurt-logo">VURT</div>
    <div class="free-tag">Always free to watch</div>
  </div>

  <div class="grid">
    <div class="tile tile-1">
      <img class="tile-img" src="../assets/phone_screen_ref.png" alt="">
      <div class="tile-shade"></div>
      <div class="tile-meta">
        <div class="tile-genre">Romance</div>
        <div class="tile-title">Karma in Heels</div>
      </div>
    </div>
    <div class="tile tile-2">
      <img class="tile-img" src="../assets/phone_screen_ref.png" alt="">
      <div class="tile-shade"></div>
      <div class="tile-meta">
        <div class="tile-genre">Drama</div>
        <div class="tile-title">Come Back Dad</div>
      </div>
    </div>
    <div class="tile tile-3">
      <img class="tile-img" src="../assets/phone_screen_ref.png" alt="">
      <div class="tile-shade"></div>
      <div class="tile-meta">
        <div class="tile-genre">Family</div>
        <div class="tile-title">Miami Kingpins</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="tag-line">Built for the Culture.</div>
    <div class="url">myvurt.com</div>
  </div>
</div>
</body>
</html>
