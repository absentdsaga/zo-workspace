<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1680px; height: 800px; overflow: hidden; background: #222; }

  .board {
    width: 1680px; height: 800px;
    background: #0B0B0B; color: #EBEBEB;
    font-family: 'Inter', sans-serif;
    padding: 100px 120px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .vurt-logo {
    position: absolute;
    top: 70px; right: 110px;
    font-weight: 900; font-size: 64px;
    letter-spacing: 0.02em; color: #EBEBEB;
  }

  .hero {
    font-weight: 800;
    font-size: 188px;
    line-height: 0.92;
    letter-spacing: -0.05em;
    color: #EBEBEB;
  }

  .hero .strike {
    color: #555;
    text-decoration: line-through;
    text-decoration-thickness: 8px;
    text-decoration-color: #E63946;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 30px;
    color: #888;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .url {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 42px;
    color: #E63946;
  }
</style>
</head>
<body>
<div class="board">
  <div class="vurt-logo">VURT</div>
  <div class="hero">
    Not a <span class="strike">streamer</span>.<br>
    A home.
  </div>
  <div class="bottom">
    <div class="sub">Vertical Cinema · Always Free</div>
    <div class="url">myvurt.com →</div>
  </div>
</div>
</body>
</html>
