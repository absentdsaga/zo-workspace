shows:

  karma-in-heels:
    display_name: "Karma in Heels"
    genre: Drama
    status: LIVE
    premiere: "2026-03-17"
    episodes: 48
    clip_count: 5
    synopsis: >
      A drama about power, loyalty, and betrayal between women navigating a world
      that underestimates them. The story centers on a woman who appears to be
      caught — but has been running the entire operation from the start. Themes of
      female agency, double-crossing, and the cost of ambition. The twist: the woman
      everyone thought was the victim is actually the one pulling all the strings.
    characters:
      - name: "Lead Female"
        role: "The woman running things behind the scenes"
        actor: "Britton Adams"
        ig: "@badams_35"
      - name: "Supporting Female"
        role: "Ally/confidante who won't back down"
        actor: "Diane August"
        ig: "@dianeaugust_theactress"
    exec_producer:
      name: "Vernon 'Snooperstar' Robinson"
      ig: "@snooperstar"
    directors:
      - name: "Dameon King"
      - name: "Kendra Rainey-King"
        ig: "@authorkendra_rainey"
    tone: "Sharp, suspenseful, empowering. Think power moves and plot twists."
    themes:
      - Female agency and power
      - Betrayal and loyalty
      - The hunter becoming the hunted
      - Ambition and its cost
    caption_hooks:
      - "He thinks he caught her. She's been running this the whole time."
      - "She came back for everyone."
      - "You came here to do a job."
      - "She's not letting her back down."
      - "Karma doesn't wear sneakers. She wears heels."
    yt_descriptions:
      - "He thinks he caught her. She's been running this the whole time."
      - "You came here to do a job."
      - "She already decided. He's just standing there."
      - "She came back for everyone."

  parking-lot-series:
    display_name: "The Parking Lot Series"
    genre: Drama
    status: LIVE
    premiere: "2026-04-01"
    episodes: null
    clip_count: 5
    synopsis: >
      A tense confrontation drama centered on a parking lot — a liminal space that's
      not quite public, not quite private. A woman tells a man to leave. He doesn't
      listen. What unfolds is a contained, escalating standoff about boundaries,
      power, and what happens when "no" isn't accepted. The parking lot becomes a
      battleground where vulnerability meets defiance.
    characters:
      - name: "Lead Female"
        actor: "Nicki Micheaux"
        ig: "@nickimicheaux"
        bio: >
          Detroit-born actress with 30 years of credits. Best known for Lincoln Heights
          (ABC Family, 2x NAACP Image Award nominee). Credits include Six Feet Under (HBO),
          The Shield (FX), Soul Food (Showtime), Animal Kingdom (TNT), S.W.A.T. (CBS).
          Also directed Summer of Violence (2024, acquired by Quiver Distribution).
      - name: "Lead Male"
        actor: "Eric Marts"
    director:
      name: "Steven Alan Davis"
      ig: "@stevanalondavis"
      bio: "Director/actor/cinematographer. Known for Lipstick the Series (2015), Loyalty (2018), The Black League of Superheroes (2021)."
    tone: "Tense, claustrophobic, slow-burn. Grounded realism with an empowering undercurrent."
    themes:
      - Boundaries and consent
      - Power dynamics
      - Vulnerability in public spaces
      - Female agency under pressure
    caption_hooks:
      - "She said leave. He didn't listen."
      - "She told him once. She won't tell him again."
      - "Some men hear 'leave' and think it's a suggestion."
      - "The parking lot. No witnesses. No backup. Just her word against his ego."
      - "She didn't raise her voice. She didn't have to."
      - "He thought she was bluffing. She wasn't asking."
      - "Nicki Micheaux in the role you won't forget."
      - "From Lincoln Heights to VURT — Nicki Micheaux in The Parking Lot."

  mardi-gras:
    display_name: "VURT Mardi Gras"
    genre: Family Drama
    status: queued
    episodes: 40
    clip_count: 5
    synopsis: >
      A New Orleans family saga set during the Christmas/holiday season. Donald "Donnie"
      Henson, a man who built a career and life away from his roots, is forced to
      confront mortality, family, and unresolved relationships after receiving a terminal
      diagnosis — Goodpasture syndrome, three weeks to live without a transplant. He
      returns to New Orleans, drops his boys off with his grandmother Mama Rose, and
      navigates a love triangle with Leah and her partner Leon that escalates to
      violence. The arc goes from diagnosis to devastation to redemption — ending with
      Donnie opening a bookstore (the Henson Agency) and finding faith, family, and
      forgiveness. Heavy New Orleans flavor: po' boys, daiquiris, cash-only spots,
      and Mama Rose's house.
    characters:
      - name: "Donald 'Donnie' Henson"
        role: "Protagonist. Estranged father, terminal diagnosis, seeking redemption."
      - name: "Mama Rose"
        role: "Family matriarch. Grandmother. Emotional anchor."
      - name: "Darius"
        role: "Donnie's brother/cousin. Recently out of jail, working construction. The connector."
      - name: "Leah"
        role: "Love interest caught between Donnie and Leon. Sees through Donnie's pain."
      - name: "Leon"
        role: "Leah's partner. Jealous, territorial. The antagonist in the love triangle."
      - name: "Dr. Vero"
        role: "Physician who delivers the terminal diagnosis."
    tone: "Heavy emotional drama with warmth and New Orleans flavor. Tearjerker to feel-good redemption."
    themes:
      - Mortality as catalyst for reconnection
      - Estranged fatherhood and guilt
      - Homecoming and identity
      - Love triangles and loyalty
      - Faith and forgiveness
      - New beginnings from endings
    key_moments:
      - ep: 7
        moment: "The Diagnosis"
        quote: "The prognosis is three weeks."
      - ep: 8
        moment: "Dropping the Boys Off"
        quote: "I'm coming back. Don't look at me like that."
      - ep: 15
        moment: "Po' Boy Reconnection"
        quote: "Stealing quarters from Mama Rose's coin tub"
      - ep: 35
        moment: "The Breakdown"
        quote: "I don't want to die."
      - ep: 40
        moment: "Bookstore Opening"
        quote: "Loving, family, blessings and forgiveness."
    caption_hooks:
      - "The doctor said three weeks. His family didn't know yet."
      - "He told his boys he'd come back. He wasn't sure he could."
      - "She chose to find him when she could've gone home. That's love."
      - "He left New Orleans to make it. He came back to survive."
      - "From a hospital bed to a bookstore opening — Donnie Henson's not done yet."

  marry-me-for-christmas:
    display_name: "Marry Me For Christmas"
    genre: Romantic Comedy-Drama
    status: queued
    episodes: 31
    clip_count: 5
    synopsis: >
      A holiday romantic comedy about Marcy Leanne Jewel Chandler, a driven NYC
      advertising executive who hasn't been home to Atlanta in years. When her favorite
      cousin Dana announces she's leaving for 5 years of missionary work in Haiti,
      Marcy feels compelled to go home for Christmas — but dreads the family pressure
      about her love life. She convinces her employee Adam to pose as her fiancé.
      What starts as a fake engagement gradually becomes real, set against the backdrop
      of a big, loud, loving Black Southern family Christmas. The emotional core: a
      daughter who stayed away too long, a mother who feels abandoned, and the fear of
      never being enough. Mom knew the engagement was fake all along.
    characters:
      - name: "Marcy Leanne Jewel Chandler"
        role: "Protagonist. NYC ad exec, workaholic, feels like the family underachiever."
      - name: "Adam"
        role: "Marcy's employee turned fake fiancé turned real love interest. From Chicago."
      - name: "Stephanie (Mom)"
        role: "Marcy's mother. Warm but direct. Knew the fake engagement all along."
      - name: "Dana"
        role: "Marcy's favorite cousin. Leaving for Haiti — the catalyst."
      - name: "Liz"
        role: "Comic relief family member. 'Too fabulous to sit in the middle.'"
      - name: "Aunt Myra"
        role: "Family organizer. Runs Christmas shopping with a whistle and timers."
    tone: "Warm, funny, emotionally grounded. Tyler Perry/BET holiday movie energy."
    themes:
      - Family vs ambition
      - The pressure to perform
      - Authenticity and vulnerability
      - Homecoming and forgiveness
      - Love sneaking in when you stop performing
    key_moments:
      - ep: 1
        moment: "Dana's bombshell call"
      - ep: 5
        moment: "Mom's porch speech"
        quote: "Your happiness is all the medicine Mother needs."
      - ep: 10
        moment: "Adam overheard scheming"
        quote: "Her company's about to explode and as her husband..."
      - ep: 15
        moment: "Mom confronts Marcy at the mall"
        quote: "I have missed my daughter. Do you understand me?"
      - ep: 25
        moment: "Marcy's confession"
        quote: "I was always the flighty one."
      - ep: 31
        moment: "Real proposal"
        quote: "I'm pretty sure I've loved you my whole life."
    caption_hooks:
      - "She faked an engagement to survive Christmas with her family... then it got real."
      - "'Your happiness is all the medicine Mother needs.' — If this line doesn't break you, nothing will."
      - "She built an empire to prove she wasn't the family failure. But all her mom wanted was her daughter home."
      - "They planned a fake breakup after the holidays. Nobody planned on catching feelings."
      - "She told the whole family the truth. Turns out, they already knew."

  my-first-love:
    display_name: "My First Love"
    genre: Romantic Drama
    status: queued
    episodes: 34
    clip_count: 5
    synopsis: >
      A romantic drama about Omar and Carmen Wright, a married couple whose marriage
      collapses under Omar's workaholism at Wright's Investments. Carmen files for
      divorce expecting Omar to fight — but he signs the papers instead. The bluff
      backfires. Carmen buys her own house and plans to move out. Omar prepares to
      sell the family home and expand to Europe. Then Carmen discovers she's pregnant —
      a near-miracle the doctor said had a "one in a billion chance." Omar shows up
      with the same note he wrote her in fourth grade: "Carmen, would you please be
      my girlfriend? Yes. Maybe. No. P.S. please say yes." They've known each other
      since childhood. The arc goes from quiet resentment to explosive confrontation
      to tender reunion.
    characters:
      - name: "Omar Wright"
        role: "Protagonist. Runs Wright's Investments. Workaholic who loves his wife but can't show it."
      - name: "Carmen (Elizabeth) Wright"
        role: "Omar's wife. Filed for divorce as a bluff. Fierce, emotional, pregnant."
      - name: "Karina"
        role: "Omar's business associate. Source of Carmen's jealousy."
      - name: "Jasmine"
        role: "Carmen's best friend. Blunt truth-teller."
      - name: "Samira"
        role: "Carmen's friend. Part of the support circle."
    tone: "Emotional, grounded, soap-opera DNA. Quiet resentment to explosive confrontation to tender reunion."
    themes:
      - Work vs love
      - The bluff that backfired
      - Miracle and second chances
      - Childhood love as foundation
      - Pride and vulnerability
    key_moments:
      - ep: 5
        moment: "The phone demand"
        quote: "Is there something you're hiding?"
      - ep: 10
        moment: "The divorce ambush"
        quote: "You left me a long time ago, Omar."
      - ep: 25
        moment: "Friends tell Carmen she was wrong"
        quote: "You ambushed the man. It was like a mob hit."
      - ep: 30
        moment: "Carmen discovers pregnancy"
        quote: "This baby is a blessing."
      - ep: 34
        moment: "Fourth-grade note / grand gesture"
        quote: "Carmen, would you please be my girlfriend? P.S. please say yes."
    caption_hooks:
      - "She filed for divorce hoping he'd fight. He signed the papers instead."
      - "Known each other since the fourth grade. Falling apart after fifteen years of marriage."
      - "The doctor said one in a billion. The universe said otherwise."
      - "She wanted him to fight for her the way he fights for his business."
      - "He showed up with the same note he wrote her in fourth grade. That's when she knew."

